apiVersion: apps/v1
kind: Deployment
metadata:
  name: socialflow-backend
  labels:
    app: socialflow-backend
spec:
  selector:
    matchLabels:
      app: socialflow-backend
  template:
    metadata:
      labels:
        app: socialflow-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: socialflow-backend
      terminationGracePeriodSeconds: 300
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        - name: migrate
          image: socialflow-backend:latest
          imagePullPolicy: Always
          command: ["npx", "prisma", "migrate", "deploy"]
          envFrom:
            - configMapRef:
                name: socialflow-config
            - secretRef:
                name: socialflow-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
      containers:
        - name: backend
          image: socialflow-backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3001
          envFrom:
            - configMapRef:
                name: socialflow-config
            - secretRef:
                name: socialflow-secrets
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "5"]
          startupProbe:
            httpGet:
              path: /health/live
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
              httpHeaders:
                - name: Authorization
                  value: Bearer ${HEALTH_CHECK_TOKEN}
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 0
            periodSeconds: 20
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
